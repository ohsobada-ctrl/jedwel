<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صانع الجداول الذكي - Jedwel</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #8b5cf6;
            --secondary: #3b82f6;
            --bg: #0f172a;
            --card-link: #1e293b;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --success: #10b981;
            --error: #ef4444;
            --glass: rgba(255, 255, 255, 0.04);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
            background: radial-gradient(circle at top right, rgba(139, 92, 246, 0.15), transparent 400px),
                radial-gradient(circle at bottom left, rgba(59, 130, 246, 0.15), transparent 400px);
        }

        /* Layout Structure */
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
        }

        @media (max-width: 850px) {
            .container {
                grid-template-columns: 1fr;
            }
        }

        /* Header Components */
        .header {
            text-align: center;
            padding: 20px 0 40px;
            grid-column: 1 / -1;
        }

        .header h1 {
            font-size: 2.5rem;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 700;
            margin-bottom: 5px;
        }

        /* Search Area */
        .search-section {
            background: var(--glass);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 25px;
            height: fit-content;
        }

        .search-bar {
            width: 100%;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            padding: 15px 45px 15px 15px;
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            margin-bottom: 20px;
            outline: none;
            transition: 0.3s;
        }

        .search-bar:focus {
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(139, 92, 246, 0.2);
        }

        /* Course List Items */
        .course-list {
            max-height: 500px;
            overflow-y: auto;
            padding-right: 5px;
        }

        .course-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }

        .course-card:hover {
            transform: scale(1.02);
            background: rgba(255, 255, 255, 0.06);
            border-color: var(--secondary);
        }

        .course-code {
            font-weight: 600;
            color: var(--primary);
            font-size: 0.9rem;
        }

        .course-name {
            font-size: 1.1rem;
            margin: 5px 0;
            display: block;
        }

        .course-meta {
            font-size: 0.85rem;
            color: var(--text-dim);
            display: flex;
            gap: 15px;
        }

        /* Schedule Visualization (The Grid) */
        .preview-section {
            background: var(--glass);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 25px;
            position: sticky;
            top: 20px;
        }

        .schedule-grid {
            display: grid;
            grid-template-columns: 80px repeat(5, 1fr);
            gap: 8px;
            margin-top: 20px;
            text-align: center;
        }

        .grid-header {
            font-weight: 700;
            font-size: 0.8rem;
            color: var(--primary);
            padding-bottom: 10px;
            border-bottom: 1px solid var(--glass-border);
        }

        .time-label {
            font-size: 0.75rem;
            color: var(--text-dim);
            align-self: center;
        }

        .grid-cell {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            min-height: 50px;
            border-radius: 8px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            transition: 0.3s;
        }

        .grid-cell.active {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            box-shadow: 0 4px 15px rgba(139, 92, 246, 0.3);
            border: none;
            color: white;
            padding: 5px;
            font-weight: 600;
        }

        .grid-cell.conflict {
            background: rgba(239, 68, 68, 0.2);
            border-color: var(--error);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.05);
            }

            100% {
                transform: scale(1);
            }
        }

        /* UI Enhancements */
        .btn-generate {
            width: 100%;
            padding: 18px;
            margin-top: 25px;
            border-radius: 15px;
            border: none;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 10px 25px -5px rgba(139, 92, 246, 0.4);
            transition: 0.3s;
        }

        .btn-generate:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px -5px rgba(139, 92, 246, 0.6);
        }

        .badge-conflict {
            background: var(--error);
            color: white;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            display: none;
            position: absolute;
            top: 10px;
            left: 10px;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--glass-border);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--primary);
        }

        .selected-list {
            margin-top: 30px;
        }

        .selected-item {
            background: rgba(139, 92, 246, 0.1);
            border: 1px solid var(--primary);
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .remove-btn {
            color: var(--error);
            border: none;
            background: none;
            cursor: pointer;
            font-size: 1.2rem;
        }
    </style>
</head>

<body>

    <div class="header">
        <h1>Jedwel Smart Planner</h1>
        <p style="color: var(--text-dim)">صمم جدولك الدراسي بلا تعارضات في دقائق</p>
    </div>

    <div class="container">
        <!-- Search & Selection -->
        <section class="search-section">
            <div style="position: relative">
                <input type="text" class="search-bar" placeholder="ابحث عن مادة أو رمز..." id="courseSearch">
                <span style="position: absolute; right: 15px; top: 15px; color: var(--text-dim)">🔍</span>
            </div>

            <div class="course-list" id="courseList">
                <!-- Courses will be injected here via JS -->
            </div>

            <div class="selected-list" id="selectedListContainer">
                <h3 style="margin-bottom: 15px; color: var(--primary)">المواد المختارة:</h3>
                <div id="selectedCourses"></div>
            </div>
        </section>

        <!-- Visualization -->
        <section class="preview-section">
            <h3 style="margin-bottom: 5px">معاينة الجدول الدراسي</h3>
            <p style="font-size: 0.85rem; color: var(--text-dim); margin-bottom: 15px">تأكد من عدم وجود تعارضات باللون
                الأحمر</p>

            <div class="schedule-grid">
                <div class="grid-header"></div>
                <div class="grid-header">الأحد</div>
                <div class="grid-header">الإثنين</div>
                <div class="grid-header">الثلاثاء</div>
                <div class="grid-header">الأربعاء</div>
                <div class="grid-header">الخميس</div>

                <!-- Generating 6 time slots -->
                <!-- 08:00 - 09:30 -->
                <div class="time-label">08:00</div>
                <div class="grid-cell" data-day="الأحد" data-slot="0"></div>
                <div class="grid-cell" data-day="الإثنين" data-slot="0"></div>
                <div class="grid-cell" data-day="الثلاثاء" data-slot="0"></div>
                <div class="grid-cell" data-day="الإربعاء" data-slot="0"></div>
                <div class="grid-cell" data-day="الخميس" data-slot="0"></div>

                <!-- 09:30 - 11:00 -->
                <div class="time-label">09:30</div>
                <div class="grid-cell" data-day="الأحد" data-slot="1"></div>
                <div class="grid-cell" data-day="الإثنين" data-slot="1"></div>
                <div class="grid-cell" data-day="الثلاثاء" data-slot="1"></div>
                <div class="grid-cell" data-day="الإربعاء" data-slot="1"></div>
                <div class="grid-cell" data-day="الخميس" data-slot="1"></div>

                <!-- 11:00 - 12:30 -->
                <div class="time-label">11:00</div>
                <div class="grid-cell" data-day="الأحد" data-slot="2"></div>
                <div class="grid-cell" data-day="الإثنين" data-slot="2"></div>
                <div class="grid-cell" data-day="الثلاثاء" data-slot="2"></div>
                <div class="grid-cell" data-day="الإربعاء" data-slot="2"></div>
                <div class="grid-cell" data-day="الخميس" data-slot="2"></div>

                <!-- 12:30 - 14:00 -->
                <div class="time-label">12:30</div>
                <div class="grid-cell" data-day="الأحد" data-slot="3"></div>
                <div class="grid-cell" data-day="الإثنين" data-slot="3"></div>
                <div class="grid-cell" data-day="الثلاثاء" data-slot="3"></div>
                <div class="grid-cell" data-day="الإربعاء" data-slot="3"></div>
                <div class="grid-cell" data-day="الخميس" data-slot="3"></div>

                <!-- 14:00 - 15:30 -->
                <div class="time-label">14:00</div>
                <div class="grid-cell" data-day="الأحد" data-slot="4"></div>
                <div class="grid-cell" data-day="الإثنين" data-slot="4"></div>
                <div class="grid-cell" data-day="الثلاثاء" data-slot="4"></div>
                <div class="grid-cell" data-day="الإربعاء" data-slot="4"></div>
                <div class="grid-cell" data-day="الخميس" data-slot="4"></div>

                <!-- 15:30 - 17:00 -->
                <div class="time-label">15:30</div>
                <div class="grid-cell" data-day="الأحد" data-slot="5"></div>
                <div class="grid-cell" data-day="الإثنين" data-slot="5"></div>
                <div class="grid-cell" data-day="الثلاثاء" data-slot="5"></div>
                <div class="grid-cell" data-day="الإربعاء" data-slot="5"></div>
                <div class="grid-cell" data-day="الخميس" data-slot="5"></div>
            </div>

            <div id="examStatus" style="margin-top:20px; font-size: 0.9rem"></div>

            <button class="btn-generate" id="finishBtn">✅ استخراج الجدول النهائي</button>
        </section>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.enableClosingConfirmation();

        let allCourses = [];
        let allExams = [];
        let selectedSubjectCodes = []; // Just the codes of the subject (e.g. ['ITGS122'])

        async function loadData() {
            try {
                // Fetch direct from the static JSON files (Vercel friendly)
                const fRes = await fetch('./faculty.json');
                if (!fRes.ok) throw new Error("Could not find faculty.json");
                allCourses = await fRes.json();

                const eRes = await fetch('./exams.json');
                if (!eRes.ok) throw new Error("Could not find exams.json");
                allExams = await eRes.json();

                updateUI(); // This will trigger render and solver
            } catch (err) {
                console.error("Error loading data:", err);
                // If direct files fail, we try to see if they are embedded (from index_final)
                if (window.allCourses) {
                    updateUI();
                } else {
                    tg.showAlert("❌ فشل تحميل البيانات. تأكد من رفع ملفات faculty.json و exams.json على Vercel.");
                }
            }
        }

        const slotMap = {
            "08:00 - 09:30": 0,
            "09:30 - 11:00": 1,
            "11:00 - 12:30": 2,
            "12:30 - 14:00": 3,
            "14:00 - 15:30": 4,
            "15:30 - 17:00": 5
        };

        function renderCourses(data) {
            const list = document.getElementById('courseList');
            list.innerHTML = '';

            // Group by code to show unique subjects
            const uniqueSubjects = [];
            const seen = new Set();
            data.forEach(c => {
                if (!seen.has(c.code) && c.code) {
                    uniqueSubjects.push(c);
                    seen.add(c.code);
                }
            });

            uniqueSubjects.forEach(subject => {
                const isSelected = selectedSubjectCodes.includes(subject.code);
                const card = document.createElement('div');
                card.className = `course-card ${isSelected ? 'selected-subject' : ''}`;
                card.style.border = isSelected ? '2px solid var(--primary)' : '1px solid var(--glass-border)';

                card.innerHTML = `
                    <span class="course-code">${subject.code}</span>
                    <span class="course-name">${subject.name}</span>
                    <div class="course-meta">
                         <span>🏷️ مادة دراسية</span>
                    </div>
                `;
                card.onclick = () => toggleSubject(subject.code);
                list.appendChild(card);
            });
        }

        function toggleSubject(code) {
            if (selectedSubjectCodes.includes(code)) {
                selectedSubjectCodes = selectedSubjectCodes.filter(c => c !== code);
            } else {
                selectedSubjectCodes.push(code);
            }
            updateUI();
        }

        function removeSubject(code) {
            selectedSubjectCodes = selectedSubjectCodes.filter(c => c !== code);
            updateUI();
        }

        // Logic to find valid combination (Backtracking)
        function findValidCombination(codes) {
            if (codes.length === 0) return [];

            const subjectOptions = {};
            codes.forEach(code => {
                subjectOptions[code] = {};
                allCourses.filter(c => c.code === code).forEach(item => {
                    const g = item.group;
                    if (!subjectOptions[code][g]) subjectOptions[code][g] = [];
                    subjectOptions[code][g].push(item);
                });
            });

            function solve(idx, currentSchedule) {
                if (idx === codes.length) return currentSchedule;

                const code = codes[idx];
                const groups = subjectOptions[code];

                for (const group in groups) {
                    const lectures = groups[group];
                    let conflict = false;

                    // 1. Check lecture overlap
                    for (const lec of lectures) {
                        if (currentSchedule.some(s => s.day === lec.day && s.time === lec.time)) {
                            conflict = true; break;
                        }
                    }
                    if (conflict) continue;

                    // 2. Check exam overlap
                    const exNew = allExams.find(e => e.code === code && e.code);
                    if (exNew) {
                        const existingCodes = [...new Set(currentSchedule.map(s => s.code))];
                        for (const eCode of existingCodes) {
                            const exOld = allExams.find(e => e.code === eCode);
                            if (exOld && exNew.exam_day === exOld.exam_day && exNew.exam_period === exOld.exam_period) {
                                conflict = true; break;
                            }
                        }
                    }
                    if (conflict) continue;

                    const res = solve(idx + 1, currentSchedule.concat(lectures));
                    if (res) return res;
                }
                return null;
            }

            return solve(0, []);
        }

        function updateUI() {
            // Re-render course list to show selection states
            const query = document.getElementById('courseSearch').value.toLowerCase();
            const filtered = allCourses.filter(c =>
                c.name.toLowerCase().includes(query) ||
                c.code.toLowerCase().includes(query)
            );
            renderCourses(filtered);

            // Update Selected List (Subjects)
            const list = document.getElementById('selectedCourses');
            list.innerHTML = '';
            selectedSubjectCodes.forEach(code => {
                const subject = allCourses.find(c => c.code === code);
                const item = document.createElement('div');
                item.className = 'selected-item';
                item.innerHTML = `
                    <div>
                        <div style="font-weight:600">${subject ? subject.name : code}</div>
                        <div style="font-size:0.8rem; color:var(--text-dim)">${code}</div>
                    </div>
                    <button class="remove-btn" onclick="removeSubject('${code}')">✕</button>
                `;
                list.appendChild(item);
            });

            // Resolve Schedule and Update Grid
            const bestSchedule = findValidCombination(selectedSubjectCodes);

            document.querySelectorAll('.grid-cell').forEach(cell => {
                cell.innerHTML = '';
                cell.className = 'grid-cell';
            });

            if (bestSchedule) {
                bestSchedule.forEach(c => {
                    const slotIdx = slotMap[c.time];
                    const cleanDay = c.day.trim();
                    const cell = document.querySelector(`.grid-cell[data-day="${cleanDay}"][data-slot="${slotIdx}"]`);
                    if (cell) {
                        cell.classList.add('active');
                        cell.innerHTML = `<span>${c.name.split(' ').slice(0, 2).join(' ')}<br><small>(G:${c.group})</small></span>`;
                    }
                });

                // Update Exam Info
                const examDiv = document.getElementById('examStatus');
                examDiv.innerHTML = '<h4 style="color:var(--primary); margin-bottom:10px">جدول الامتحانات المقترح:</h4>';
                selectedSubjectCodes.forEach(code => {
                    const ex = allExams.find(e => e.code === code);
                    const name = allCourses.find(c => c.code === code)?.name || code;
                    if (ex && ex.code) {
                        examDiv.innerHTML += `<div style="margin-bottom:5px; padding:5px; background:rgba(255,255,255,0.05); border-radius:5px">📍 ${name}: ${ex.exam_day} (${ex.exam_period})</div>`;
                    }
                });

                document.getElementById('finishBtn').style.opacity = '1';
                document.getElementById('finishBtn').disabled = false;
                document.getElementById('finishBtn').innerText = '✅ استخراج الجدول النهائي';
            } else if (selectedSubjectCodes.length > 0) {
                // Conflict state
                const examDiv = document.getElementById('examStatus');
                examDiv.innerHTML = '<div style="color:var(--error); font-weight:700">⚠️ تنبيه: لا توجد توليفة مجموعات متاحة بدون تعارض لهذه المواد!</div>';
                document.getElementById('finishBtn').style.opacity = '0.5';
                document.getElementById('finishBtn').disabled = true;
                document.getElementById('finishBtn').innerText = '❌ تعارض في المجموعات';
            } else {
                document.getElementById('examStatus').innerHTML = '';
                document.getElementById('finishBtn').innerText = '✅ استخراج الجدول النهائي';
            }
        }

        // Search logic
        document.getElementById('courseSearch').oninput = (e) => {
            const query = e.target.value.toLowerCase();
            const filtered = allCourses.filter(c =>
                c.name.toLowerCase().includes(query) ||
                c.code.toLowerCase().includes(query)
            );
            renderCourses(filtered);
        };

        document.getElementById('finishBtn').onclick = () => {
            const finalSchedule = findValidCombination(selectedSubjectCodes);
            if (!finalSchedule || finalSchedule.length === 0) {
                tg.showAlert("برجاء اختيار مواد صالحة أولاً!");
                return;
            }
            tg.sendData(JSON.stringify(finalSchedule));
            tg.close();
        };

        loadData();
    </script>
</body>

</html>
